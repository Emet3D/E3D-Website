<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E3D — Pedidos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #f7eeec; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 20px; color: #f5c9c6; }
  .login { max-width: 300px; margin: 100px auto; text-align: center; }
  .login input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #292929; background: #1a1a1a; color: #f7eeec; border-radius: 6px; }
  .login button { padding: 10px 24px; background: #f5c9c6; color: #0d0d0d; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
  .login .error { color: #ff6b6b; font-size: 14px; margin-top: 8px; display: none; }
  .orders { display: none; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-box { background: #1a1a1a; padding: 16px 20px; border-radius: 8px; border: 1px solid #292929; min-width: 120px; }
  .stat-box .num { font-size: 28px; font-weight: bold; color: #f5c9c6; }
  .stat-box .label { font-size: 12px; color: #888; }
  .order-card { background: #1a1a1a; border: 1px solid #292929; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .order-card .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .order-card .oid { font-weight: bold; font-size: 16px; }
  .order-card .status { font-size: 12px; padding: 3px 8px; border-radius: 4px; }
  .status-pending { background: #664b00; color: #ffd700; }
  .status-approved { background: #004d26; color: #00e676; }
  .status-rejected { background: #4d0000; color: #ff5252; }
  .order-card .items { font-size: 14px; color: #ccc; margin: 8px 0; }
  .order-card .items li { margin-left: 16px; padding: 2px 0; }
  .order-card .meta { font-size: 12px; color: #888; }
  .order-card .total { font-size: 18px; font-weight: bold; color: #f5c9c6; }
  .ship-info { font-size: 13px; color: #aaa; padding: 6px 0; border-top: 1px solid #292929; margin-top: 6px; }
  .refresh { padding: 8px 16px; background: #292929; color: #f7eeec; border: 1px solid #f5c9c6; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
  .refresh:hover { background: #3a3a3a; }
  #statusMsg { color: #888; font-size: 14px; margin-bottom: 16px; }
  .empty { color: #888; text-align: center; padding: 40px; }
</style>
</head>
<body>

<div class="login" id="loginBox">
  <h1>🔐 Pedidos E3D</h1>
  <input type="password" id="tokenInput" placeholder="Token de administrador">
  <button onclick="login()">Entrar</button>
  <div class="error" id="loginError">Token incorrecto</div>
</div>

<div class="orders" id="ordersBox">
  <h1>📦 Pedidos</h1>
  <div class="stats" id="stats"></div>
  <button class="refresh" onclick="loadOrders()">🔄 Actualizar</button>
  <div id="statusMsg">Cargando...</div>
  <div id="orderList"></div>
</div>

<script>
var API = 'https://e3d-pago.emet3d.workers.dev';
var token = localStorage.getItem('e3d_admin_token');

function login() {
  token = document.getElementById('tokenInput').value;
  localStorage.setItem('e3d_admin_token', token);
  document.getElementById('loginError').style.display = 'none';
  loadOrders();
}

function showLogin() {
  document.getElementById('loginBox').style.display = 'block';
  document.getElementById('ordersBox').style.display = 'none';
  document.getElementById('tokenInput').value = token || '';
}

function showOrders() {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('ordersBox').style.display = 'block';
}

function statusClass(s) {
  if (s === 'approved') return 'status-approved';
  if (s === 'rejected' || s === 'cancelled' || s === 'refunded') return 'status-rejected';
  return 'status-pending';
}

function statusLabel(s) {
  var map = { 'approved': '✅ Aprobado', 'pending': '⏳ Pendiente', 'rejected': '❌ Rechazado', 'cancelled': 'Cancelado', 'refunded': 'Reembolsado', 'in_process': 'En proceso' };
  return map[s] || s;
}

function formatPrice(n) { return '$' + Number(n).toLocaleString('es-AR'); }

async function loadOrders() {
  if (!token) { showLogin(); return; }
  document.getElementById('statusMsg').textContent = 'Cargando...';
  try {
    var r = await fetch(API + '/orders?token=' + encodeURIComponent(token));
    var data = await r.json();
    if (!data.ok) { document.getElementById('statusMsg').textContent = 'Error: ' + data.error; return; }
    var orders = data.orders || [];
    document.getElementById('statusMsg').textContent = orders.length + ' pedido' + (orders.length !== 1 ? 's' : '');
    renderOrders(orders);
    showOrders();
  } catch(e) {
    document.getElementById('statusMsg').textContent = 'Error de conexion';
  }
}

function renderOrders(orders) {
  var approved = orders.filter(function(o) { return o.status === 'approved'; });
  var pending = orders.filter(function(o) { return o.status === 'pending'; });
  var totalRevenue = approved.reduce(function(s, o) { return s + (o.total || 0); }, 0);

  document.getElementById('stats').innerHTML =
    '<div class="stat-box"><div class="num">' + orders.length + '</div><div class="label">Total pedidos</div></div>' +
    '<div class="stat-box"><div class="num">' + approved.length + '</div><div class="label">Aprobados</div></div>' +
    '<div class="stat-box"><div class="num">' + pending.length + '</div><div class="label">Pendientes</div></div>' +
    '<div class="stat-box"><div class="num">' + formatPrice(totalRevenue) + '</div><div class="label">Recaudado</div></div>';

  if (!orders.length) {
    document.getElementById('orderList').innerHTML = '<div class="empty">No hay pedidos todavia</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    var itemsHtml = '';
    if (o.items && o.items.length) {
      itemsHtml = '<ul class="items">';
      for (var j = 0; j < o.items.length; j++) {
        var it = o.items[j];
        itemsHtml += '<li>' + it.name + ' x' + it.qty + ' = ' + formatPrice(it.qty * parseFloat(it.price)) + '</li>';
      }
      itemsHtml += '</ul>';
    }
    var dateStr = o.date ? new Date(o.date).toLocaleString('es-AR') : '—';
    var payerStr = o.payer ? (o.payer.name || '') + (o.payer.email ? ' (' + o.payer.email + ')' : '') : '—';
    var ship = o.shipping || {};
    var shipHtml = '';
    if (ship.name || ship.city) {
      shipHtml = '<div class="ship-info">' +
        '<strong>📦 Envío:</strong> ' +
        (ship.name ? ship.name + ' &middot; ' : '') +
        (ship.phone ? ship.phone + '<br>' : '') +
        (ship.address ? ship.address + ', ' : '') +
        (ship.city ? ship.city + ', ' : '') +
        (ship.province ? ship.province + ' &middot; ' : '') +
        (ship.zip ? 'CP ' + ship.zip : '') +
        (o.shippingCost > 0 ? '<br>💰 Costo envío: ' + formatPrice(o.shippingCost) : '<br>✅ Envío gratis') +
        '</div>';
    }
    html +=
      '<div class="order-card">' +
      '<div class="header">' +
      '<span class="oid">' + o.id + '</span>' +
      '<span class="status ' + statusClass(o.status) + '">' + statusLabel(o.status) + '</span>' +
      '</div>' +
      itemsHtml +
      '<div class="total">' + formatPrice(o.total) + '</div>' +
      shipHtml +
      '<div class="meta">' + dateStr + (o.mp_payment_id ? ' &middot; MP: ' + o.mp_payment_id : '') + '</div>' +
      (payerStr !== '—' ? '<div class="meta">' + payerStr + '</div>' : '') +
      '</div>';
  }
  document.getElementById('orderList').innerHTML = html;
}

// Auto-login on load
if (token) loadOrders();
</script>
</body>
</html>
